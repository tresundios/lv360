###############################################################################
# docker-compose.qa.yml — QA Environment Deployment
# Separate DB per environment, pre-built images from Docker Hub
###############################################################################

services:
  fastapi:
    image: docker.io/navistresundios/lamviec360-backend:${DOCKER_IMAGE_TAG:-qa-latest}
    container_name: lv360_fastapi_qa
    restart: always
    env_file:
      - ./env/.env.qa
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lv360-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  react:
    image: docker.io/navistresundios/lamviec360-frontend:${DOCKER_IMAGE_TAG:-qa-latest}
    container_name: lv360_react_qa
    restart: always
    ports:
      - "80:80"
    depends_on:
      - fastapi
    networks:
      - lv360-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  postgres:
    image: postgres:15-alpine
    container_name: lv360_postgres_qa
    restart: always
    env_file:
      - ./env/.env.qa
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lamviec360_qa}
      POSTGRES_USER: ${POSTGRES_USER:-lv360_qa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Kolkata
    volumes:
      - lv360_pgdata_qa:/var/lib/postgresql/data
    networks:
      - lv360-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lv360_qa} -d ${POSTGRES_DB:-lamviec360_qa}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: lv360_redis_qa
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - lv360_redisdata_qa:/data
    networks:
      - lv360-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  lv360-network:
    driver: bridge
    name: lv360-network-qa

volumes:
  lv360_pgdata_qa:
    driver: local
    name: lv360_pgdata_qa
  lv360_redisdata_qa:
    driver: local
    name: lv360_redisdata_qa
